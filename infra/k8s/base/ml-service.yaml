apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: supercanvas
  labels:
    app: ml-service
    app.kubernetes.io/name: ml-service
    app.kubernetes.io/part-of: supercanvas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ml-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60  # Longer — training jobs may be in flight
      containers:
        - name: ml-service
          image: ghcr.io/supercanvas/ml-service:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supercanvas-secrets
                  key: database-url
            - name: R2_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: supercanvas-secrets
                  key: r2-account-id
            - name: R2_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: supercanvas-secrets
                  key: r2-access-key-id
            - name: R2_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: supercanvas-secrets
                  key: r2-secret-access-key
            - name: R2_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: supercanvas-secrets
                  key: r2-bucket-name
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: supercanvas-secrets
                  key: otel-endpoint
            - name: OTEL_SERVICE_NAME
              value: "ml-service"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: supercanvas
  labels:
    app: ml-service
spec:
  selector:
    app: ml-service
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-service-hpa
  namespace: supercanvas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75

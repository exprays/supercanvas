apiVersion: v1
kind: Secret
metadata:
  name: supercanvas-secrets
  namespace: supercanvas
type: Opaque
# Values injected by CI/CD from GitHub Actions secrets.
# To create manually:
#   kubectl create secret generic supercanvas-secrets \
#     --from-literal=database-url="..." \
#     --from-literal=redis-url="..." \
#     --from-literal=redis-token="..." \
#     --from-literal=r2-account-id="..." \
#     --from-literal=r2-access-key-id="..." \
#     --from-literal=r2-secret-access-key="..." \
#     --from-literal=r2-bucket-name="..." \
#     --from-literal=otel-endpoint="..." \
#     -n supercanvas
stringData:
  database-url: "PLACEHOLDER"
  redis-url: "PLACEHOLDER"
  redis-token: "PLACEHOLDER"
  r2-account-id: "PLACEHOLDER"
  r2-access-key-id: "PLACEHOLDER"
  r2-secret-access-key: "PLACEHOLDER"
  r2-bucket-name: "PLACEHOLDER"
  otel-endpoint: "PLACEHOLDER"

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: supercanvas

resources:
  - ../base

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: backtest-engine
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: ml-service
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
    target:
      kind: HorizontalPodAutoscaler
      name: backtest-engine-hpa
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2
    target:
      kind: HorizontalPodAutoscaler
      name: ml-service-hpa

images:
  - name: ghcr.io/supercanvas/backtest-engine
    newTag: IMAGE_TAG
  - name: ghcr.io/supercanvas/ml-service
    newTag: IMAGE_TAG

commonLabels:
  environment: staging

# ─────────────────────────────────────────────
# SuperCanvas — CI/CD Pipeline
# Lint → Typecheck → Test → Build
# ─────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"
  GO_VERSION: "1.26"
  PYTHON_VERSION: "3.13"

jobs:
  # ── Web App (Next.js) ──
  web:
    name: Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}

  # ── Go Backtest Engine ──
  backtest-engine:
    name: Backtest Engine (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backtest-engine
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/backtest-engine/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /tmp/backtest-engine ./cmd/server

  # ── Python ML Service ──
  ml-service:
    name: ML Service (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ml-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: |
          pip install ruff
          ruff check .

  # ── Docker Build Test ──
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [web, backtest-engine, ml-service]
    steps:
      - uses: actions/checkout@v4

      - name: Build backtest-engine image
        run: docker build -t supercanvas/backtest-engine:test ./apps/backtest-engine

      - name: Build ml-service image
        run: docker build -t supercanvas/ml-service:test ./apps/ml-service

# ─────────────────────────────────────────────
# SuperCanvas — Docker Compose (Local Development)
# PostgreSQL and Redis for local dev
# Cloud services: Neon, Upstash, Convex, Inngest, R2, Redpanda Cloud
# ─────────────────────────────────────────────

version: "3.9"

services:
  # Local PostgreSQL (for offline dev — use Neon for staging/prod)
  postgres:
    image: postgres:16-alpine
    container_name: supercanvas-postgres
    environment:
      POSTGRES_DB: supercanvas
      POSTGRES_USER: supercanvas
      POSTGRES_PASSWORD: supercanvas_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supercanvas"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local Redis (for offline dev — use Upstash for staging/prod)
  redis:
    image: redis:7-alpine
    container_name: supercanvas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Go Backtest Engine
  backtest-engine:
    build:
      context: ./apps/backtest-engine
      dockerfile: Dockerfile
    container_name: supercanvas-backtest
    ports:
      - "50051:50051"
      - "8080:8080"
    environment:
      GRPC_PORT: "50051"
      HTTP_PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Python ML Service
  ml-service:
    build:
      context: ./apps/ml-service
      dockerfile: Dockerfile
    container_name: supercanvas-ml
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://supercanvas:supercanvas_dev@postgres:5432/supercanvas"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
